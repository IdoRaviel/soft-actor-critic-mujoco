# Per-environment overrides for Ant-v4.
# Ant has a 27-dim obs and 8-dim action space and a long 1000-step horizon —
# a harder locomotion task than Pusher/Reacher, so it gets more warmup and a
# larger training budget.

env_id: Ant-v4
exp_name: sac
total_steps: 5000000
start_steps: 30000
eval_interval: 10000
eval_episodes: 10
hidden_sizes: [256, 256]
batch_size: 256
