# Per-environment overrides for Ant-v4.
# Ant has a 111-dim obs and 8-dim action space — significantly larger than
# Pusher/Reacher. We use a bigger network and more warmup, but stay within
# the 1M-step budget.

env_id: Ant-v4
exp_name: sac
total_steps: 5000000
start_steps: 30000
eval_interval: 10000
eval_episodes: 10
hidden_sizes: [256, 256]
batch_size: 256
